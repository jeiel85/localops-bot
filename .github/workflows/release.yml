name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '9.0'

      # Single source of truth for the version: the git tag. Stamped into the assemblies
      # (so UpdateService.CurrentVersion is correct and auto-update compares properly),
      # the installer, and the setup banner. Tag "v0.3.0" -> VER "0.3.0".
      - name: Resolve version from tag
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          "VER=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Publish Agent
        run: dotnet publish src/LocalOpsBot.Agent/LocalOpsBot.Agent.csproj -c Release -r win-x64 --self-contained true -p:Version=${{ env.VER }} -p:AssemblyVersion=${{ env.VER }} -p:FileVersion=${{ env.VER }} -p:InformationalVersion=${{ env.VER }} -o publish/Agent

      - name: Publish Tray
        run: dotnet publish src/LocalOpsBot.Tray/LocalOpsBot.Tray.csproj -c Release -r win-x64 --self-contained true -p:Version=${{ env.VER }} -p:AssemblyVersion=${{ env.VER }} -p:FileVersion=${{ env.VER }} -p:InformationalVersion=${{ env.VER }} -o publish/Tray

      - name: Create Setup.zip (combined package)
        run: |
          New-Item -ItemType Directory -Force -Path publish\Setup\Agent | Out-Null
          New-Item -ItemType Directory -Force -Path publish\Setup\Tray | Out-Null
          New-Item -ItemType Directory -Force -Path publish\Setup\config | Out-Null
          Copy-Item "publish\Agent\*" "publish\Setup\Agent\" -Recurse -Force
          Copy-Item "publish\Tray\*" "publish\Setup\Tray\" -Recurse -Force
          Copy-Item "config\appsettings.example.json" "publish\Setup\config\" -Force
          Copy-Item "installer\setup.ps1" "publish\Setup\" -Force
          Copy-Item "installer\uninstall-service.ps1" "publish\Setup\" -Force
          Copy-Item "installer\register-startup-tray.ps1" "publish\Setup\" -Force
          Compress-Archive -Path publish\Setup\* -DestinationPath Homebase-Setup.zip -Force
          $hash = (Get-FileHash Homebase-Setup.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path Homebase-Setup.zip.sha256 -Value $hash

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Setup.exe (Inno Setup)
        run: iscc "/DAppVersion=${{ env.VER }}" installer\setup.iss

      - name: Build release notes
        shell: pwsh
        run: |
          # Notes = the download-guide header + ONLY this version's CHANGELOG section
          # (from "## v<VER>" up to the next version heading), so they don't accumulate.
          $header = Get-Content installer\release-notes-header.md -Raw
          $changelog = Get-Content CHANGELOG.md -Raw
          $pattern = '(?ms)^##\s+v' + [regex]::Escape($env:VER) + '\b.*?(?=^##\s+v|\z)'
          $match = [regex]::Match($changelog, $pattern)
          $section = if ($match.Success) { $match.Value.TrimEnd() } else { $changelog.TrimEnd() }
          Set-Content -Path RELEASE_NOTES.md -Value ($header + "`r`n`r`n" + $section + "`r`n") -Encoding UTF8

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: Homebase ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            publish/Homebase-Setup.exe
            Homebase-Setup.zip
            Homebase-Setup.zip.sha256
            installer/bootstrap.ps1
            config/appsettings.example.json
